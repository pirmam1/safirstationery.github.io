<!DOCTYPE html>
<html>
<head>
  <title>Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
    }

    header {
      padding: 80px 20px;
    }

    h1 {
      font-size: 50px;
      animation: fadeIn 2s;
    }

    p {
      font-size: 22px;
      animation: fadeIn 3s;
    }

    img {
      width: 180px;
      border-radius: 50%;
      margin-top: 20px;
      animation: float 3s infinite;
    }

    .buttons a {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      background: #ff7eb3;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .buttons a:hover {
      background: #ff4f91;
      transform: scale(1.1);
    }

    section {
      padding: 50px 20px;
      background: white;
      color: black;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes float {
      0% {transform: translateY(0);}
      50% {transform: translateY(-10px);}
      100% {transform: translateY(0);}
    }
  </style>

</head>
<body>

  <!-- 🔝 سەرەوە -->
  <header>
    <h1>سڵاو 🌟</h1>
    <p>من سەفیرم - دیزاینەر و پڕۆگرامەر</p>

    <!-- 🖼️ وێنە -->
    <img src="https://via.placeholder.com/180" alt="profile">

    <!-- 🔘 دوگمەکان (لینک) -->
    <div class="buttons">
      <a href="https://facebook.com" target="_blank">Facebook</a>
      <a href="https://instagram.com" target="_blank">Instagram</a>
    </div>
  </header>

  <!-- 💼 بەشی Portfolio -->
  <section>
    <h2>کارەکانم 💼</h2>
    <p>لێرە دەتوانم نموونەی کارەکانم دانێم</p>
  </section>

</body>
</html>
